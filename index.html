<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a group on Dailyk</title>
  <style>
    :root { --accent: #FF6B2C; --bg: #FFF5EC; --ink: #1C1A17; --muted: #6B6256; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
      background: #fff; border-radius: 24px; padding: 36px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .logo {
      width: 84px; height: 84px; margin: 0 auto 20px; border-radius: 20px;
      background: var(--accent); color: #fff; font-size: 44px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
    .btn {
      display: block; width: 100%; padding: 15px 18px; margin: 10px 0;
      border-radius: 14px; font-size: 16px; font-weight: 700; text-decoration: none;
      border: none; cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
    .code { font-size: 12px; color: var(--muted); margin-top: 18px; word-break: break-all; }
    .hint { font-size: 13px; color: var(--muted); margin-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">D</div>
    <h1>You're invited to a group</h1>
    <p>Open this invite in Dailyk to join. If you don't have the app yet, download it first — then tap the link again.</p>

    <a id="openApp" class="btn btn-primary" href="#">Open in Dailyk</a>
    <a id="appStore" class="btn btn-secondary" href="https://apps.apple.com/app/id6761105877">Download on the App Store</a>

    <div class="hint">Already have Dailyk? Tap “Open in Dailyk”. After installing, reopen the original invite link.</div>
    <div class="code" id="code"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var code = (params.get('code') || '').trim();
      var openApp = document.getElementById('openApp');
      if (code) {
        openApp.setAttribute('href', 'dailyk://join?code=' + encodeURIComponent(code));
        document.getElementById('code').textContent = 'Invite code: ' + code;
      } else {
        openApp.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
