<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a group on Dailyk</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --faint: #86868b;
      --blue: #0071e3;
      --hairline: rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 400px; width: 100%; text-align: center;
      background: var(--card); border-radius: 20px;
      padding: 40px 28px 32px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      border: 1px solid var(--hairline);
    }
    .icon {
      width: 96px; height: 96px; border-radius: 22px; margin: 0 auto 18px;
      display: block; object-fit: cover;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      border: 1px solid var(--hairline);
    }
    .app-name { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
    .tagline { font-size: 14px; color: var(--faint); margin: 4px 0 24px; }
    .headline { font-size: 19px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
    .sub { font-size: 15px; color: var(--muted); line-height: 1.5; margin: 0 0 26px; }

    /* Official-style App Store badge */
    .appstore {
      display: inline-flex; align-items: center; gap: 10px;
      background: #000; color: #fff; text-decoration: none;
      padding: 10px 18px; border-radius: 12px; min-width: 200px;
      justify-content: center;
    }
    .appstore svg { flex: 0 0 auto; }
    .appstore .txt { text-align: left; line-height: 1.1; }
    .appstore .small { display: block; font-size: 11px; font-weight: 400; opacity: 0.92; }
    .appstore .big { display: block; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }

    .open {
      display: inline-block; margin-top: 16px;
      color: var(--blue); font-size: 15px; font-weight: 500; text-decoration: none;
    }
    .open:hover { text-decoration: underline; }

    .divider { height: 1px; background: var(--hairline); margin: 26px 0 16px; }
    .foot { font-size: 12px; color: var(--faint); line-height: 1.5; }
    .code { font-size: 12px; color: var(--faint); margin-top: 8px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="icon.png" alt="Dailyk" />
    <p class="app-name">Dailyk</p>
    <p class="tagline">Tasks, Deadlines &amp; Reminders</p>

    <h1 class="headline">You're invited to a group</h1>
    <p class="sub">Get Dailyk to join. Already have the app? Tap “Open in Dailyk”.</p>

    <a class="appstore" href="https://apps.apple.com/app/id6761105877" aria-label="Download on the App Store">
      <svg width="22" height="26" viewBox="0 0 384 512" aria-hidden="true">
        <path fill="#fff" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg>
      <span class="txt"><span class="small">Download on the</span><span class="big">App Store</span></span>
    </a>

    <div><a id="openApp" class="open" href="#">Open in Dailyk</a></div>

    <div class="divider"></div>
    <p class="foot">Dailyk — shared task groups for family &amp; teams.</p>
    <p class="code" id="code"></p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var code = (params.get('code') || '').trim();
      var openApp = document.getElementById('openApp');
      if (code) {
        openApp.setAttribute('href', 'dailyk://join?code=' + encodeURIComponent(code));
        document.getElementById('code').textContent = 'Invite code: ' + code;
      } else {
        openApp.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
